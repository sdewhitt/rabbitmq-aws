name: Build-RMQ

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Runs weekly on Monday 00:00 UTC

permissions:
  contents: read

jobs:
  build-cache-rabbitmq-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rmq-version: ['v3.13.7', 'v4.2.x', 'v4.3.x', 'main']
        include:
          - rmq-version: 'main'
            otp-version: 28
            elixir-version: 1.18
          - rmq-version: 'v4.3.x'
            otp-version: 27
            elixir-version: 1.18
          - rmq-version: 'v4.2.x'
            otp-version: 27
            elixir-version: 1.18
          - rmq-version: 'v3.13.7'
            otp-version: 26
            elixir-version: 1.16
    steps:
      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: ${{ matrix.otp-version }}
          elixir-version: ${{ matrix.elixir-version }}
      - id: clone-rabbitmq-server
        run: |
          git clone --branch ${{ matrix.rmq-version }} https://github.com/rabbitmq/rabbitmq-server.git ${{ github.workspace }}/rabbitmq-server
      - id: build-rabbitmq-server
        run: make -C ${{ github.workspace }}/rabbitmq-server
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/rabbitmq-server
          key: rmq-${{ matrix.rmq-version }}-otp-${{ matrix.otp-version }}-elixir-${{ matrix.elixir-version }}
