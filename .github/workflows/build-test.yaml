name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *' # Runs daily at 16:00 UTC

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rmq-version: ['v3.13.7', 'v4.2.x', 'v4.3.x', 'main']
        include:
          - rmq-version: 'main'
            otp-version: 28
            elixir-version: 1.18
          - rmq-version: 'v4.3.x'
            otp-version: 27
            elixir-version: 1.18
          - rmq-version: 'v4.2.x'
            otp-version: 27
            elixir-version: 1.18
          - rmq-version: 'v3.13.7'
            otp-version: 26
            elixir-version: 1.16
    steps:
      - id: restore-rabbitmq-server-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/rabbitmq-server
          key: rmq-${{ matrix.rmq-version }}-otp-${{ matrix.otp-version }}-elixir-${{ matrix.elixir-version }}
      - id: maybe-fail-rabbitmq-server-miss
        if: steps.restore-rabbitmq-server-cache.outputs.cache-hit != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.setFailed('could not restore cached rabbitmq-server build');
      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: ${{ matrix.otp-version }}
          elixir-version: ${{ matrix.elixir-version }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: rabbitmq-server/deps/aws
      # OpenLDAP is required by aws_auth_validate_ldap_SUITE. Without it
      # that suite skips itself; installing slapd lets it run for real.
      - name: Set up OpenLDAP (slapd) for the LDAP validation suite
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            ldap-utils \
            slapd \
            util-linux
          # The suite starts and configures its own slapd instance, so stop
          # and disable the system one (and AppArmor, which confines slapd).
          sudo systemctl stop slapd
          sudo aa-teardown || true
          sudo systemctl disable --now apparmor.service || true
      - run: make -C ${{ github.workspace }}/rabbitmq-server/deps/aws
      - run: make -C ${{ github.workspace }}/rabbitmq-server/deps/aws tests
      - name: maybe upload CT logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ct-logs-${{ matrix.rmq-version }}-otp-${{ matrix.otp-version }}
          path: ${{ github.workspace }}/rabbitmq-server/logs/
